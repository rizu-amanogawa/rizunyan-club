<style>
html{
    scroll-behavior:smooth;
}
*{
    box-sizing:border-box;
}
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}
/* ---------- SECTION ---------- */
.section{
    padding:34px 16px;
    max-width:720px;
    margin:auto;
}
.section h2{
    font-size:clamp(34px, 9vw, 54px);
    margin-top:0;
    margin-bottom:18px;
    border-left:5px solid #00aaff;
    padding-left:12px;
    line-height:1.1;
}
/* ---------- CARD ---------- */
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    backdrop-filter:blur(6px);
}
/* ---------- INFO ---------- */
.info-item{
    padding:18px 0;
    border-bottom:1px solid rgba(255,255,255,0.08);
}
.info-item:last-child{
    border-bottom:none;
}
.label{
    font-size:14px;
    opacity:0.65;
    margin-bottom:8px;
}
.value{
    font-size:18px;
    line-height:1.8;
}
/* ---------- MESSAGE ---------- */
.message{
    line-height:2;
    font-size:17px;
}
/* ---------- BUTTON ---------- */
.link-button{
    width:100%;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#101010;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:bold;
    margin-top:18px;
    transition:0.25s;
}
.link-button:hover{
    border-color:#00aaff;
    background:#151515;
}
/* ---------- FOOTER ---------- */
footer{
    padding:30px 10px;
    text-align:center;
    opacity:0.45;
    font-size:11px;
}
/* ---------- MOBILE ---------- */
@media(max-width:480px){
    .section{
        padding:28px 14px;
    }
    .card{
        padding:18px;
    }
    .value{
        font-size:16px;
    }
}
</style>
</head>
