<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<meta name="description"
content="りずにゃんクラブの詳細ページ">
<title>
りずにゃんクラブ | 詳細
</title>
<style>
html{
    scroll-behavior:smooth;
}
*{
    box-sizing:border-box;
}
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}
.hero{
    min-height:24vh;
    background:
    linear-gradient(
        rgba(0,0,0,0.5),
        rgba(0,0,0,0.9)
    ),
    url("IMG_2641.jpeg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}
.hero h1{
    font-size:clamp(36px, 9vw, 54px);
    margin:0;
}
.section{
    padding:34px 16px;
    max-width:620px;
    margin:auto;
}
.section h2{
    font-size:clamp(30px, 8vw, 48px);
    margin-top:0;
    margin-bottom:18px;
    border-left:5px solid #00aaff;
    padding-left:12px;
}
.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
}
.card p{
    line-height:1.9;
    font-size:16px;
    opacity:0.94;
    margin:0;
}
.link-button{
    width:100%;
    min-height:54px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#101010;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:bold;
    margin-top:20px;
    transition:0.25s;
}
.link-button:hover{
    border-color:#00aaff;
    background:#151515;
}
footer{
    padding:30px 10px;
    text-align:center;
    opacity:0.45;
    font-size:11px;
}
</style>
</head>
<body>
<div class="hero">
    <h1>
        詳細
    </h1>
</div>
<div class="section">
    <h2>
        コミュニティ詳細
    </h2>
    <div class="card">
        <p>
            ここにコミュニティの詳細説明を記載します。<br><br>
            ・どんな人向けなのか<br>
            ・どんな雰囲気なのか<br>
            ・どういう活動をしているのか<br>
            ・初心者歓迎について など
        </p>
        <a class="link-button"
        href="./index.html#about">
        トップへ戻る
        </a>
    </div>
</div>
<footer>
    © rizunyan club
</footer>
</body>
</html>
