<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のおすすめ | りずにゃんクラブ</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:sans-serif;
}

.container{
    width:92%;
    max-width:500px;
    margin:0 auto;
    padding:20px 0;
    text-align:center;
}

h1{
    font-size:26px;
    margin-bottom:8px;
}

.sub{
    color:#aaa;
    margin-bottom:20px;
    font-size:14px;
}

.video-card{
    background:#111;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    overflow:hidden;
    margin-bottom:20px;
}

.video-card img{
    width:100%;
    height:240px;
    object-fit:cover;
    display:block;
}

.video-info{
    padding:16px;
}

.video-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
    line-height:1.4;
    min-height:84px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.video-text{
    color:#aaa;
    margin-bottom:16px;
    line-height:1.6;
    font-size:14px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.watch-button{
    display:inline-block;
    padding:10px 18px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    text-decoration:none;
    background:#111;
    cursor:pointer;
    transition:0.3s;
    font-size:14px;
}

.watch-button:hover{
    background:#1d1d1d;
    border-color:#00aaff;
}

.back{
    margin-top:24px;
}

.back a{
    color:#aaa;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>今日のおすすめ</h1>

<div class="sub">
毎回ランダムで表示されます。<br>
</div>

<div id="video-area">
読み込み中...
</div>

<div class="back">
<a href="index.html">← トップページへ戻る</a>
</div>

</div>

<script>

let videos = [];
let currentIndex = -1;

async function loadVideos() {

    try {

        const response = await fetch("videos.json");

        videos = await response.json();

        showRandomVideo();

    } catch(error) {

        document.getElementById("video-area").innerHTML =
        "<p>動画データの読み込みに失敗しました。</p>";

        console.error(error);
    }
}

function showRandomVideo(){

    if(videos.length === 0){
        return;
    }

    let history =
        JSON.parse(
            localStorage.getItem("videoHistory") || "[]"
        );

    let availableVideos =
        videos.filter(
            video => !history.includes(video.url)
        );

    if(availableVideos.length === 0){

        history = [];

        availableVideos = videos;

    }

    const randomVideo =
        availableVideos[
            Math.floor(
                Math.random() * availableVideos.length
            )
        ];

    history.push(randomVideo.url);

    if(history.length > 100){
        history.shift();
    }

    localStorage.setItem(
        "videoHistory",
        JSON.stringify(history)
    );

    document.getElementById("video-area").innerHTML = `
    <div class="video-card">

        <img src="${randomVideo.image}">

        <div class="video-info">

            <div class="video-title">
                ${randomVideo.title}
            </div>

            <div class="video-text">
                ${randomVideo.text}
            </div>

            <div class="buttons">

                <a
                    class="watch-button"
                    href="${randomVideo.url}"
                    target="_blank">
                    動画を見る
                </a>

                <button
                    class="watch-button"
                    onclick="showRandomVideo()">
                    次の動画を見る
                </button>

            </div>

        </div>

    </div>
    `;
}

loadVideos();

</script>

</body>
</html>
