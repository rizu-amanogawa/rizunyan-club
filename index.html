<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>りずにゃんクラブ</title>

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}

/* ---------- TOP ---------- */

.hero{
    height:42vh;

    background:
    linear-gradient(
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.82)
    ),
    url("IMG_2641.jpeg");

    background-size:cover;
    background-repeat:no-repeat;
    background-position:center top;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:12px 16px;

    box-sizing:border-box;
}

.hero h1{
    font-size:clamp(34px, 9vw, 52px);
    margin:0 0 10px 0;
    line-height:1.2;
}

.hero p{
    font-size:clamp(13px, 3.5vw, 18px);
    line-height:1.7;
    opacity:0.9;
    max-width:500px;
}

/* ---------- MENU ---------- */

.menu{
    position:sticky;
    top:0;
    z-index:1000;

    display:flex;
    justify-content:space-around;
    align-items:center;

    background:#0d0d0d;

    border-top:1px solid rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.08);

    padding:10px 6px;

    backdrop-filter:blur(10px);
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:12px;
    font-weight:bold;
    opacity:0.9;
    letter-spacing:1px;
}

/* ---------- SECTION ---------- */

.section{
    padding:34px 14px;
    max-width:520px;
    margin:auto;
}

.section h2{
    font-size:clamp(24px, 7vw, 38px);
    margin-bottom:18px;

    border-left:4px solid #00aaff;
    padding-left:10px;
}

/* ---------- CARD ---------- */

.card{
    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:16px;

    padding:14px;

    margin-bottom:14px;

    backdrop-filter:blur(6px);
}

.card h3{
    margin-top:0;
    font-size:22px;
    margin-bottom:10px;
}

.card p{
    line-height:1.7;
    opacity:0.9;
    font-size:13px;
}

/* ---------- GALLERY ---------- */

.gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);

    gap:8px;

    margin-top:12px;
}

.gallery img{
    width:100%;

    height:90px;

    object-fit:cover;

    border-radius:10px;

    border:1px solid rgba(255,255,255,0.12);

    transition:0.25s;
}

.gallery img:hover{
    transform:scale(1.02);
}

/* ---------- NEWS ---------- */

.news-box{
    max-height:140px;
    overflow-y:auto;
    padding-right:6px;
}

.news-item{
    padding:10px 0;

    border-bottom:1px solid rgba(255,255,255,0.08);

    font-size:12px;
}

/* ---------- LINK ---------- */

.link-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;

    margin
