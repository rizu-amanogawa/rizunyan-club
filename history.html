<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<meta name="description"
content="りずにゃんクラブの成り立ち">
<title>
りずにゃんクラブ | 成り立ち
</title>
<style>
html{
    scroll-behavior:smooth;
}
*{
    box-sizing:border-box;
}
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:sans-serif;
    overflow-x:hidden;
}
.hero{
    min-height:24vh;
    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.9)
    ),
    url("IMG_2641.jpeg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}
.hero h1{
    font-size:clamp(34px, 9vw, 54px);
    margin:0;
}
.section{
    padding:34px 16px;
    max-width:620px;
    margin:auto;
}
.history-card{
    margin-bottom:50px;
}
.history-card img{
    width:100%;
    border-radius:18px;
    margin-bottom:16px;
    border:1px solid rgba(255,255,255,0.08);
    object-fit:cover;
}
.history-card h2{
    font-size:clamp(30px, 8vw, 46px);
    margin-top:0;
    margin-bottom:18px;
    border-left:5px solid #00aaff;
    padding-left:12px;
}
.history-card p{
    line-height:2;
    font-size:16px;
    opacity:0.94;
    margin:0;
}
.link-button{
    width:100%;
    min-height:54px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#101010;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:bold;
    margin-top:30px;
    transition:0.25s;
}
.link-button:hover{
    border-color:#00aaff;
    background:#151515;
}
footer{
    padding:30px 10px;
    text-align:center;
    opacity:0.45;
    font-size:11px;
}
</style>
</head>
<body>
<div class="hero">
    <h1>
        成り立ち
    </h1>
</div>
<div class="section">
    <!-- HISTORY 1 -->
    <div class="history-card">
        <img src="IMG_2637.jpeg">
        <h2>
            設立
        </h2>
        <p>
            りずにゃんクラブは、
            VRChatを通じた交流を目的として設立されました。<br><br>
            初心者でも気軽に遊べる環境づくりを目指し、
            少人数での雑談会やワールド巡りから活動を開始しました。
        </p>
    </div>
    <!-- HISTORY 2 -->
    <div class="history-card">
        <img src="IMG_2732.jpeg">
        <h2>
            イベント活動開始
        </h2>
        <p>
            交流イベント「しゅわしゅわ会」を中心に、
            継続的なイベント開催を開始。<br><br>
            その後、
            ゲームワールド会や突発イベントなど、
            活動内容を拡大していきました。
        </p>
    </div>
    <!-- HISTORY 3 -->
    <div class="history-card">
        <img src="IMG_2739.jpeg">
        <h2>
            現在
        </h2>
        <p>
            現在は初心者から常連まで、
            幅広い参加者が交流するコミュニティとして活動しています。<br><br>
            「気軽に遊べる場所」をコンセプトに、
            VRChatでの交流を続けています。
        </p>
    </div>
    <a class="link-button"
    href="./index.html#about">
    トップへ戻る
    </a>
</div>
<footer>
    © rizunyan club
</footer>
</body>
</html>
